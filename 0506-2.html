<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>시간에 따른 배경색</title>
</head>
<body>

<script>
let now = new Date();
let hour = now.getHours();

// 오전 / 오후 판단
if (hour < 12) {
    document.body.style.backgroundColor = "lightskyblue";
} else {
    document.body.style.backgroundColor = "orange";
}

// 시간 출력
document.write("오전이면 lightskyblue, 오후이면 orange 배경<br><hr>");
document.write("현재 시간 : " 
    + hour + "시," 
    + now.getMinutes() + "분," 
    + now.getSeconds() + "초");
</script>

</body>
</html>
