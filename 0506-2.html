<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>시간에 따른 배경색</title>
</head>
<body>

<script>
let now = new Date();
let hour = now.getHours();

// 배경색
if (hour < 12) {
    document.body.style.backgroundColor = "lightskyblue";
} else {
    document.body.style.backgroundColor = "orange";
}

document.write("<span style='font-size:20px; font-weight:bold;'>오전이면 lightskyblue, 오후이면 orange 배경</span><br><hr>");

document.write("현재 시간 : " 
    + hour + "시," 
    + now.getMinutes() + "분," 
    + now.getSeconds() + "초");
</script>

</body>
</html>
