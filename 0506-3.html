<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>요일에 따른 배경색</title>
</head>
<body>

<script>
let now = new Date();
let day = now.getDay();

if (day == 0) {
    document.body.style.backgroundColor = "pink";
} else {
    document.body.style.backgroundColor = "gold";
}

let week = ["일요일","월요일","화요일","수요일","목요일","금요일","토요일"];


document.write("<span style='font-size:20px; font-weight:bold;'>일요일은 pink, 다른 요일은 gold 배경</span><br><hr>");

document.write("오늘 : " 
    + now.getDate() + "일, " 
    + week[day]);
</script>

</body>
</html>
